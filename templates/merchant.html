<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>R.GLOBAL - MERCHANT MASTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #000080; --purple: #8e44ad; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; }
        
        .top-nav { background: white; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .main-menu { background: var(--navy); display: flex; padding: 0 40px; list-style: none; margin: 0; min-height: 50px; align-items: center; }
        .main-menu li { position: relative; }
        .main-menu li a { color: white; text-decoration: none; padding: 15px 20px; display: block; font-size: 14px; font-weight: 600; }
        .main-menu li a:hover { background: rgba(255,255,255,0.1); }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: white;
            min-width: 200px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            z-index: 1001;
            top: 100%;
        }
        .dropdown-content a {
            color: var(--navy) !important;
            padding: 12px 16px !important;
            border-bottom: 1px solid #eee;
        }
        .dropdown-content a:hover { background-color: #f1f1f1 !important; }
        .dropdown:hover .dropdown-content { display: block; }

        
        .container { padding: 30px 40px; }
        .master-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8fafc; color: var(--navy); font-size: 12px; text-transform: uppercase; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 10% auto; padding: 30px; border-radius: 12px; width: 400px; }
    </style>
</head>
<body>

<header class="top-nav">
    <h2 style="color:var(--navy); margin:0;">R.GLOBAL <span style="color:var(--purple)">MASTER</span></h2>
    <div style="font-weight:bold; color:var(--navy);">User: {{ user }}</div>
</header>

<nav>
    <ul class="main-menu" id="horizontal-menu">
        </ul>
</nav>

<div class="container" id="master-content" style="display: none; padding: 30px 40px;">
    <div class="master-card" style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Merchant </h3>
            <button onclick="openModal()" style="background:var(--navy); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">
                <i class="fa fa-plus"></i> Add New Merchant
            </button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Group Name</th>
                    <th>Type</th>
                    <th>Region</th>
                    <th>Country</th>
                    <th style="text-align:center;">Controls</th>
                </tr>
            </thead>
            <tbody id="merchant-rows"></tbody>
        </table>
    </div>
</div>

<div id="welcome-msg" style="text-align:center; margin-top:100px; color:var(--navy);">
    <h1>Welcome to R.GLOBAL Master Menu</h1>
    <p>Select <b>Merchnat Group</b> from the Merchant menu above to view and edit records.</p>
</div>

<script>
    async function init() {
        const mRes = await fetch('/get_menu');
        const menus = await mRes.json();
        
        let menuHTML = "";
        menus.forEach(m => {
            if (m.name === "Merchant") {
                menuHTML += `
                    <li class="dropdown">
                        <a href="javascript:void(0)"><i class="fa ${m.icon}"></i> ${m.name} <i class="fa fa-caret-down"></i></a>
                        <div class="dropdown-content">
                            <a href="javascript:void(0)" onclick="showRegistry()"><i class="fa fa-list"></i> Master Registry</a>
                            <a href="javascript:void(0)" onclick="openModal()"><i class="fa fa-plus"></i> Add New Master</a>
                        </div>
                    </li>`;
            } else {
                menuHTML += `<li><a href="${m.route}"><i class="fa ${m.icon}"></i> ${m.name}</a></li>`;
            }
        });
        document.getElementById('horizontal-menu').innerHTML = menuHTML;
    }

    function showRegistry() {
        document.getElementById('welcome-msg').style.display = 'none';
        document.getElementById('master-content').style.display = 'block';
        loadTable(); 
    }

    async function loadTable() {
    const res = await fetch('/get_merchants');
    const data = await res.json();
    
    const rows = data.map(m => `
        <tr>
            <td>#${m.id}</td>
            <td><b>${m.name}</b></td>
            <td>${m.level_type || 'Group'}</td>
            <td>${m.region || 'N/A'}</td>
            <td>${m.country || 'N/A'}</td>
            <td style="text-align:center;">
                <button onclick="deleteMerchant(${m.id})" style="color:red; border:none; background:none; cursor:pointer;">
                    <i class="fa fa-trash"></i>
                </td>
            </tr>
    `).join('');
    
    document.getElementById('merchant-rows').innerHTML = rows;
}

async function deleteMerchant(merchantId) {
    // 1. Confirm with user
    if (!confirm("Are you sure you want to delete this record?")) return;

    try {
        // 2. Send DELETE request to the specific ID
        const response = await fetch(`/delete_merchant/${merchantId}`, {
            method: 'DELETE'
        });

        const result = await response.json();

        if (response.ok) {
            alert("Deleted successfully!");
            loadTable(); // Refresh the table automatically
        } else {
            alert("Error: " + result.message);
        }
    } catch (error) {
        console.error("Delete failed:", error);
        alert("Could not connect to server.");
    }
}

    window.onload = init;
</script>
</body>
</html>
