<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>R.GLOBAL - Product Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --aiims-blue: #000080; --aiims-purple: #8e44ad; --success-green: #27ae60; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-image: url('/static/bg.jpg'); background-size: cover; background-attachment: fixed; }
        
        /* Top Navigation */
        .top-nav { background: white; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Main Blue Menu Bar */
        .main-menu { background-color: var(--aiims-blue); display: flex; padding: 0 40px; list-style: none; margin: 0; min-height: 50px; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .main-menu li { position: relative; }
        .main-menu li a { color: white; text-decoration: none; padding: 15px 25px; display: block; font-size: 14px; font-weight: 600; cursor: pointer; }
        .main-menu li a:hover { background: rgba(255,255,255,0.1); }

        /* Dropdown Styling */
        .dropdown-content { display: none; position: absolute; background: white; min-width: 200px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); z-index: 1001; top: 100%; border-radius: 0 0 5px 5px; }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a { color: var(--aiims-blue) !important; padding: 12px 20px !important; border-bottom: 1px solid #eee; text-decoration: none; display: block; font-weight: 500; cursor: pointer; }
        .dropdown-content a:hover { background: #f1f1f1; }
        
        /* Layout */
        .container { padding: 30px 40px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .product-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; transition: 0.3s; }
        .product-card img { width: 100%; height: 180px; object-fit: contain; border-radius: 8px; }
        .product-price { color: var(--success-green); font-weight: bold; font-size: 1.2rem; margin: 10px 0; }
        
        /* Dynamic Data Section (For Merchant Details) */
        #data-section { display: none; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .user-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .user-table th, .user-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .user-table th { background: #f8f9fa; color: var(--aiims-blue); }

        /* Modals */
        .btn-main { background: var(--aiims-blue); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 15px; width: 380px; position: relative; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        #cart-count { position: absolute; top: -8px; right: -8px; background: #e74c3c; color: white; border-radius: 50%; padding: 2px 7px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <header class="top-nav">
        <h2 style="margin:0; color:var(--aiims-blue);">R.GLOBAL <span style="color:var(--aiims-purple)">PRODUCTS</span></h2>
        <div style="display:flex; gap:20px; align-items:center;">
            <div style="position:relative; cursor:pointer;" onclick="window.location.href='/cart'">
                <i class="fa fa-shopping-cart" style="font-size:1.6rem; color:var(--aiims-blue);"></i>
                <span id="cart-count">0</span>
            </div>
            <button onclick="openAddModal()" class="btn-main"><i class="fa fa-plus"></i> Add Product</button>
            <button onclick="window.location.href='/logout'" style="background: #eee; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Logout</button>
        </div>
    </header>

    <nav><ul class="main-menu" id="horizontal-menu"></ul></nav>

    <div class="container">
        <div id="product-view">
            <h3>Best Sellers</h3>
            <div id="best-product-grid" class="product-grid"></div>
            <br><hr style="border:0; border-top:1px solid #ddd;"><br>
            <h3>All Inventory</h3>
            <div id="regular-product-grid" class="product-grid"></div>
        </div>

        <div id="data-section">
            <button onclick="showProducts()" style="padding: 8px 15px; border:none; cursor:pointer; background:#eee; border-radius:5px;"><i class="fa fa-arrow-left"></i> Back to Products</button>
            <h2 id="section-title" style="color:var(--aiims-blue); margin-top:20px;">Section Name</h2>
            <table class="user-table">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer;" onclick="closeAddModal()">&times;</span>
            <h3 style="margin-top:0; color:var(--aiims-blue);">New Product Entry</h3>
            <input type="text" id="p_name" placeholder="Product Name">
            <input type="number" id="p_price" placeholder="Price ($)">
            <input type="number" id="p_stock" placeholder="Stock Quantity">
            <select id="p_category">
                <option value="Regular Product">Regular Product</option>
                <option value="Best Product">Best Product</option>
            </select>
            <input type="file" id="p_image" accept="image/*">
            <button onclick="saveNewProduct()" class="btn-main" style="width:100%; justify-content:center;">Save to Inventory</button>
        </div>
    </div>

    <script>
        async function init() {
            await loadMenu();
            loadProducts();
            updateCartCount(); 
        }

        function showProducts() {
            document.getElementById('product-view').style.display = 'block';
            document.getElementById('data-section').style.display = 'none';
        }

        async function loadMenu() {
            const res = await fetch('/get_menu');
            const data = await res.json();
            const menuUl = document.getElementById('horizontal-menu');
            
            menuUl.innerHTML = data.map(item => {
                const name = item.name.toLowerCase();
                if (name.includes('merchant')) {
                    return `
                    <li class="dropdown">
                        <a href="javascript:void(0)">Merchant <i class="fa fa-caret-down"></i></a>
                        <div class="dropdown-content">
                            <a onclick="loadMerchantData('group')">Merchant Group</a>
                            <a onclick="loadMerchantData('details')">Merchant Details</a>
                            <a onclick="loadMerchantData('season')">Seasons</a>
                        </div>
                    </li>`;
                }
                return `<li><a href="${item.route}">${item.name}</a></li>`;
            }).join('');
        }

        async function loadMerchantData(type) {
            document.getElementById('product-view').style.display = 'none';
            document.getElementById('data-section').style.display = 'block';
            
            const title = document.getElementById('section-title');
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            body.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';

            try {
                let url = '';
                if (type === 'group') {
                    title.innerText = "Merchant Groups";
                    head.innerHTML = "<tr><th>ID</th><th>Group Name</th><th>Region</th></tr>";
                    url = '/get_merchants';
                } else if (type === 'details') {
                    title.innerText = "Merchant Details";
                    head.innerHTML = "<tr><th>ID</th><th>Name</th><th>Email</th><th>Region</th></tr>";
                    url = '/get_merchant_details/0';
                } else if (type === 'season') {
                    title.innerText = "Seasons";
                    head.innerHTML = "<tr><th>ID</th><th>Season</th><th>Description</th></tr>";
                    url = '/get_seasons';
                }

                const res = await fetch(url);
                const data = await res.json();
                body.innerHTML = data.map(row => {
                    if (type === 'group') return `<tr><td>${row.id}</td><td>${row.name}</td><td>${row.region}</td></tr>`;
                    if (type === 'details') return `<tr><td>${row.id}</td><td>${row.name}</td><td>${row.email || 'N/A'}</td><td>${row.region}</td></tr>`;
                    if (type === 'season') return `<tr><td>${row.id}</td><td>${row.season_name || row.name}</td><td>${row.description}</td></tr>`;
                }).join('');
            } catch (e) { body.innerHTML = '<tr><td colspan="5" style="color:red;">Error loading data.</td></tr>'; }
        }

        async function loadProducts() {
            const pRes = await fetch('/get_products');
            const products = await pRes.json();
            const bestGrid = document.getElementById('best-product-grid');
            const regularGrid = document.getElementById('regular-product-grid');
            bestGrid.innerHTML = ''; regularGrid.innerHTML = '';

            products.forEach(p => {
                const cardHtml = `
                    <div class="product-card">
                        <img src="/static/${p.image}" onerror="this.src='https://placehold.co/200?text=${p.name}'">
                        <h4>${p.name}</h4>
                        <div class="product-price">$${p.price}</div>
                        <div style="font-size:12px; color:#666;">Stock: ${p.stock}</div>
                        <button style="background:var(--success-green); color:white; border:none; padding:10px; width:100%; border-radius:8px; cursor:pointer; margin-top:10px;">
                            <i class="fa fa-cart-plus"></i> Add to Cart
                        </button>
                    </div>`;
                if (p.category === 'Best Product') bestGrid.innerHTML += cardHtml;
                else regularGrid.innerHTML += cardHtml;
            });
        }

        function openAddModal() { document.getElementById('addProductModal').style.display = "block"; }
        function closeAddModal() { document.getElementById('addProductModal').style.display = "none"; }
        
        async function saveNewProduct() {
            const formData = new FormData();
            formData.append('name', document.getElementById('p_name').value);
            formData.append('price', document.getElementById('p_price').value);
            formData.append('stock', document.getElementById('p_stock').value);
            formData.append('category', document.getElementById('p_category').value);
            formData.append('image_file', document.getElementById('p_image').files[0]);

            const res = await fetch('/add_product', { method: 'POST', body: formData });
            if (res.ok) { location.reload(); }
        }

        window.onload = init;
    </script>
</body>
</html>
