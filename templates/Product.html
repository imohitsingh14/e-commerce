<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>R.GLOBAL - Product Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --aiims-blue: #000080; --aiims-purple: #8e44ad; --success-green: #27ae60; --danger-red: #e74c3c; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-image: url('/static/bg.jpg'); background-size: cover; background-attachment: fixed; }
        
        /* Navigation */
        .top-nav { background: white; padding: 10px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .main-menu { background-color: var(--aiims-blue); display: flex; padding: 0 40px; list-style: none; margin: 0; min-height: 50px; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .main-menu li { position: relative; }
        .main-menu li a { color: white; text-decoration: none; padding: 15px 25px; display: block; font-size: 14px; font-weight: 600; cursor: pointer; }
        
        /* Dropdowns */
        .dropdown-content { display: none; position: absolute; background: white; min-width: 200px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); z-index: 1001; top: 100%; border-radius: 0 0 5px 5px; }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a { color: var(--aiims-blue) !important; padding: 12px 20px !important; border-bottom: 1px solid #eee; text-decoration: none; display: block; font-weight: 500; cursor: pointer; }

        /* Product Cards */
        .container { padding: 30px 40px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .product-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; position: relative; }
        .product-card img { width: 100%; height: 180px; object-fit: contain; border-radius: 8px; }
        
        /* Action Buttons */
        .btn-main { background: var(--aiims-blue); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: var(--danger-red); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        #cart-count { position: absolute; top: -8px; right: -8px; background: var(--danger-red); color: white; border-radius: 50%; padding: 2px 7px; font-size: 11px; font-weight: bold; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 15px; width: 380px; }
    </style>
</head>
<body>

    <header class="top-nav">
        <h2 style="margin:0; color:var(--aiims-blue);">R.GLOBAL <span style="color:var(--aiims-purple)">PRODUCTS</span></h2>
        <div style="display:flex; gap:20px; align-items:center;">
            <div style="position:relative; cursor:pointer;" onclick="window.location.href='/cart'">
                <i class="fa fa-shopping-cart" style="font-size:1.6rem; color:var(--aiims-blue);"></i>
                <span id="cart-count">0</span>
            </div>
            <button onclick="openAddModal()" class="btn-main"><i class="fa fa-plus"></i> Add Product</button>
            <button onclick="window.location.href='/logout'" style="background: #eee; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Logout</button>
        </div>
    </header>

    <nav><ul class="main-menu" id="horizontal-menu"></ul></nav>

    <div class="container">
        <div id="product-view">
            <h3>Best Sellers</h3>
            <div id="best-product-grid" class="product-grid"></div>
            <br><hr style="border:0; border-top:1px solid #ddd;"><br>
            <h3>All Inventory</h3>
            <div id="regular-product-grid" class="product-grid"></div>
        </div>
    </div>

    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer;" onclick="closeAddModal()">&times;</span>
            <h3 style="color:var(--aiims-blue);">New Product Entry</h3>
            <input type="text" id="p_name" placeholder="Name" style="width:100%; padding:10px; margin:10px 0;">
            <input type="number" id="p_price" placeholder="Price" style="width:100%; padding:10px; margin:10px 0;">
            <input type="number" id="p_stock" placeholder="Stock" style="width:100%; padding:10px; margin:10px 0;">
            <select id="p_category" style="width:100%; padding:10px; margin:10px 0;">
                <option value="Regular Product">Regular Product</option>
                <option value="Best Product">Best Product</option>
            </select>
            <input type="file" id="p_image" style="margin:10px 0;">
            <button onclick="saveNewProduct()" class="btn-main" style="width:100%; justify-content:center;">Save Product</button>
        </div>
    </div>

    <script>
        async function init() {
            await loadMenu();
            await loadProducts();
            updateCartCount(); 
        }

        async function loadMenu() {
            const res = await fetch('/get_menu');
            const data = await res.json();
            const menuUl = document.getElementById('horizontal-menu');
            
            menuUl.innerHTML = data.map(item => {
                const name = item.name.toLowerCase();
                if (name.includes('merchant')) {
                    return `<li class="dropdown"><a href="#">Merchant <i class="fa fa-caret-down"></i></a>
                        <div class="dropdown-content">
                            <a href="/merchants">Merchant Group</a>
                            <a href="/details">Merchant Details</a>
                        </div></li>`;
                }
                if (name.includes('production')) {
                    return `<li class="dropdown"><a href="#">Production <i class="fa fa-caret-down"></i></a>
                        <div class="dropdown-content">
                            <a onclick="alert('Sampling')">Sampling</a>
                            <a onclick="alert('Cutting')">Cutting</a>
                            <a onclick="alert('Stitching')">Stitching</a>
                        </div></li>`;
                }
                return `<li><a href="${item.route}">${item.name}</a></li>`;
            }).join('');
        }

        async function loadProducts() {
            const res = await fetch('/get_products');
            const products = await res.json();
            const bestGrid = document.getElementById('best-product-grid');
            const regularGrid = document.getElementById('regular-product-grid');
            bestGrid.innerHTML = ''; regularGrid.innerHTML = '';

            products.forEach(p => {
                const card = `
                    <div class="product-card">
                        <button class="delete-btn" onclick="deleteProduct(${p.id})"><i class="fa fa-trash"></i></button>
                        <img src="/static/${p.image}" onerror="this.src='https://placehold.co/200'">
                        <h4>${p.name}</h4>
                        <div class="product-price">$${p.price}</div>
                        <button onclick="addToCart(${p.id}, '${p.name}', ${p.price})" style="background:var(--success-green); color:white; border:none; padding:10px; width:100%; border-radius:8px; cursor:pointer;">
                            Add to Cart
                        </button>
                    </div>`;
                if (p.category === 'Best Product') bestGrid.innerHTML += card;
                else regularGrid.innerHTML += card;
            });
        }

        // --- NEW DELETE LOGIC ---
        async function deleteProduct(id) {
            if (!confirm("Are you sure you want to delete this product?")) return;
            
            const res = await fetch(`/delete_product/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert("Product Deleted");
                loadProducts();
            } else {
                alert("Error deleting product");
            }
        }

        function addToCart(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('userCart')) || [];
            const existing = cart.find(i => i.id === id);
            if (existing) existing.quantity += 1;
            else cart.push({ id, name, price, quantity: 1 });
            localStorage.setItem('userCart', JSON.stringify(cart));
            updateCartCount();
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('userCart')) || [];
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.quantity, 0);
        }

        function openAddModal() { document.getElementById('addProductModal').style.display = "block"; }
        function closeAddModal() { document.getElementById('addProductModal').style.display = "none"; }

        async function saveNewProduct() {
            const formData = new FormData();
            formData.append('name', document.getElementById('p_name').value);
            formData.append('price', document.getElementById('p_price').value);
            formData.append('stock', document.getElementById('p_stock').value);
            formData.append('category', document.getElementById('p_category').value);
            formData.append('image_file', document.getElementById('p_image').files[0]);

            await fetch('/add_product', { method: 'POST', body: formData });
            location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
