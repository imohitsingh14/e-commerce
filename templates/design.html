<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.GLOBAL - DESIGN SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --aiims-blue: #000080; 
            --aiims-purple: #8e44ad; 
            --success: #27ae60; 
            --warning: #f39c12; 
            --danger: #c62828; 
            --light-bg: #f4f7f6;
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light-bg); }
        
        .top-nav { 
            background: white; 
            padding: 10px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }

        .main-menu { 
            background-color: var(--aiims-blue); 
            display: flex; 
            padding: 0 40px; 
            list-style: none; 
            margin: 0; 
            min-height: 50px; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .main-menu li { position: relative; }
        .main-menu li a { color: white; text-decoration: none; padding: 15px 25px; display: block; font-size: 14px; font-weight: 600; cursor: pointer; }
        .main-menu li a:hover { background: rgba(255,255,255,0.1); }

        .dropdown-content { 
            display: none; 
            position: absolute; 
            background: white; 
            min-width: 200px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.2); 
            z-index: 1001; 
            top: 100%; 
        }

        .dropdown:hover > .dropdown-content { display: block; }
        .dropdown-content a { 
            color: var(--aiims-blue) !important; 
            padding: 12px 20px !important; 
            border-bottom: 1px solid #f1f1f1; 
            text-decoration: none; 
            display: block; 
            cursor: pointer; 
            font-size: 13px; 
        }

        #form-view { 
            display: none; 
            position: fixed; 
            z-index: 2000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); 
            overflow-y: auto;
        }

        #form-view .card { width: 70%; margin: 50px auto; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from {transform: translateY(-20px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }

        .container { padding: 30px 40px; max-width: 1300px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; overflow: hidden; }
        .card-header { padding: 20px 30px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 30px; }
        
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #636e72; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input[readonly] { background-color: #f9f9f9; color: var(--aiims-purple); font-weight: bold; border: 1px solid #eee; }

        .btn-submit { background: var(--aiims-blue); color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-bottom: 10px; }
        .btn-forward { background: var(--success); color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; display: none; margin-bottom: 10px; border: 2px solid #1e8449; }
        .btn-new-request { background: var(--aiims-purple); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-save-batch { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; display: none; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; background: #f8f9fa; padding: 15px; font-size: 12px; color: var(--aiims-blue); border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 13px; }

        .badge { display: inline-block; min-width: 80px; text-align: center; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase;}
        .bg-tracking { background: #fff3e0; color: #e65100; }
        .bg-received { background: #e8f5e9; color: #2e7d32; }
        .bg-cutting_queue { background: #f3e5f5; color: #7b1fa2; border: 1px solid #7b1fa2; }
        .bg-completed { background: #e3f2fd; color: #1565c0; border: 1px solid #1565c0; }
        
        .search-container { position: relative; width: 300px; }
        .search-container input { padding-left: 35px; border-radius: 20px; }
        .search-container i { position: absolute; left: 12px; top: 12px; color: #aaa; }
        .row-selector { width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <header class="top-nav">
        <h2 style="margin:0; color:var(--aiims-blue);">R.GLOBAL <span style="color:var(--aiims-purple)">DESIGN</span></h2>
        <button onclick="window.location.href='/logout'" style="background: #eee; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">Logout</button>
    </header>

    <nav><ul class="main-menu" id="horizontal-menu"></ul></nav>

    <div class="container">
        <div id="database-view" class="card">
            <div class="card-header">
                <h3 id="table-title" style="margin:0; color:var(--aiims-blue);">Design Tracking</h3>
                <div class="search-container">
                    <i class="fa fa-search"></i>
                    <input type="text" id="tableSearch" onkeyup="filterTable()" placeholder="Search requests...">
                </div>
                <div id="headerActions">
                    <button class="btn-new-request" id="headerNewRequestBtn" onclick="openFormModal()"><i class="fa fa-plus"></i> NEW REQUEST</button>
                    <button class="btn-save-batch" id="batchSaveBtn" onclick="processBatchCutting()"><i class="fa fa-save"></i> MOVE TO CUTTING</button>
                </div>
            </div>
            <div class="card-body"> 
                <div style="overflow-x: auto;">
                    <table>
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="form-view">
            <div class="card">
                <div class="card-header">
                    <h3 id="form-header-text" style="margin:0; color:var(--aiims-blue);">NEW REQUEST</h3>
                </div>
                <div class="card-body">
                    <div class="form-row">
                        <div><label>Request ID</label><input type="text" id="req_id" readonly></div>
                        <div><label>Buyer Group</label><select id="buyer_group" onchange="fetchMerchant_details(this.value)"></select></div>
                        <div><label>Buyer Detail</label><select id="buyer_details"></select></div>
                    </div>
                    <div class="form-row">
                        <div><label>Sample Type</label>
                            <select id="sample_type">
                                <option value="Material Sample">Material Sample</option>
                                <option value="Fit Sample">Fit Sample</option>
                                <option value="Size Set">Size Set</option>
                                <option value="Washing Sample">Washing Sample</option>
                            </select>
                        </div>
                        <div><label>Fabric Detail</label><input type="text" id="fabric" placeholder="Enter fabric detail"></div>
                        <div><label>Target Date</label><input type="date" id="deadline"></div>
                    </div>

                    <div style="margin: 25px 0; border: 1px solid #eee; padding: 15px; border-radius: 8px; background: #fafafa">
                        <label style="color:var(--aiims-blue); font-weight:bold; margin-bottom: 10px; display:block;">ITEM BREAKDOWN</label>   
                        <table class="grid-table">
                            <thead><tr><th>Color</th><th>Qty</th><th>Size</th><th style="width:40px;"></th></tr></thead>
                            <tbody id="samplingGridBody"></tbody>
                        </table>
                        <button type="button" class="btn-add" style="background:#eee; border:1px dashed blue; width:100%; padding:8px; cursor:pointer; margin-top:10px;" onclick="addRow('samplingGridBody')">+ ADD ROW</button> 
                    </div>

                    <textarea id="remarks" rows="2" placeholder="Internal remarks..."></textarea>

                    <div style="margin-top:20px;">
                        <button class="btn-submit" id="mainSubmitBtn" onclick="submitEntry()">SUBMIT REQUEST</button>
                        <button class="btn-forward" id="forwardBtn" onclick="forwardToReceived()">FORWARD TO RECEIVED</button>
                        <button type="button" onclick="closeFormModal()" style="width:100%; background:none; border:none; color:grey; cursor:pointer; padding:10px;">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    let editingDbId = null;
    let currentFilter = 'tracking';

    window.onload = async function() { 
        await loadMenu(); 
        await fetchMerchants(); 
        showSection('Tracking'); 
    };

    async function loadMenu() {
        const menuUl = document.getElementById('horizontal-menu');
        try {
            const res = await fetch('/get_menu');
            const menus = await res.json();
            menuUl.innerHTML = menus.map(m => {
                if (m.name.toLowerCase().includes('design')) {
                    return `<li class="dropdown">
                        <a href="#">Design <i class="fa fa-caret-down"></i></a>
                        <div class="dropdown-content">
                            <a onclick="showSection('Tracking')">Sampling</a>
                            <a onclick="showSection('Received')">Received</a>
                            <a onclick="showSection('Cutting')">Cutting</a>
                        </div>
                    </li>`;
                }
                return `<li><a href="${m.route}">${m.name}</a></li>`;
            }).join('');
        } catch (e) { 
            menuUl.innerHTML = '<li><a onclick="showSection(\'Tracking\')">Design Tracking</a></li>';
        }
    }

    function showSection(type) {
        currentFilter = type.toLowerCase();
        closeFormModal();
        document.getElementById('table-title').innerText = (type === 'Cutting') ? "Cutting Queue" : type + " View";
        document.getElementById('headerNewRequestBtn').style.display = (currentFilter === 'tracking') ? 'block' : 'none';
        document.getElementById('batchSaveBtn').style.display = (currentFilter === 'received') ? 'block' : 'none';
        document.getElementById('tableSearch').value = '';
        loadExistingEntries(type);
    }

    async function loadExistingEntries(filterType) {
        const tbody = document.getElementById('tableBody');
        const thead = document.getElementById('tableHead');
        const filter = filterType.toLowerCase();

        let checkboxHeader = filter === 'received' ? 
    `<th style="width:40px;"><input type="checkbox" id="designMasterReceived" onclick="toggleDesignCheckboxes(this)"></th>` : '';
        thead.innerHTML = `<tr>${checkboxHeader}<th>ID</th><th>Buyer Group</th><th>Details</th><th>Sample</th><th>Fabric</th><th>Color</th><th>Size</th><th>Qty</th><th>Deadline</th><th>Status</th><th>Action</th></tr>`;
        tbody.innerHTML = "<tr><td colspan='12' style='text-align:center'>Loading...</td></tr>"; 

        try {
            const res = await fetch('/get_design_data/design_requests');
            const entries = await res.json();
            tbody.innerHTML = "";
            
            const filteredEntries = entries.filter(e => {
                const s = (e.item_status || e.status || '').toLowerCase().trim();
                if (filter === 'cutting') return (s === 'cutting_queue' || s === 'completed');
                return s === filter;
            });

            if (filteredEntries.length === 0) {
                tbody.innerHTML = `<tr><td colspan='12' style='text-align:center'>No records found.</td></tr>`;
                return;
            }
        
            filteredEntries.forEach(entry => {
                const s = (entry.item_status || entry.status).toLowerCase().trim();
                const row = document.createElement('tr');
                row.dataset.entry = JSON.stringify(entry);
                if (s === 'completed') row.style.opacity = '0.75';

            let checkboxCell = filter === 'received' ? 
               `<td><input type="checkbox" class="design-row-cb" id="design-cb-${entry.item_id}" value="${entry.item_id}" onclick="event.stopPropagation()"></td>` : '';
                
                let actionHtml = "";
                if (s === 'cutting_queue') {
                    actionHtml = `<button onclick="markCuttingComplete(${entry.item_id}, this)" style="background:var(--success); color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">DONE</button>`;
                } else if (s === 'tracking') {
                    actionHtml = `<button onclick="prepareEdit(this)" style="border:none; background:none; cursor:pointer; margin-right:10px;"><i class="fa fa-edit" style="color:var(--warning)"></i></button>
                                  <button onclick="deleteEntry(${entry.id})" style="border:none; background:none; cursor:pointer;"><i class="fa fa-trash" style="color:var(--danger)"></i></button>`;
                } else if (s === 'completed') {
                    actionHtml = `<i class="fa fa-check-circle" style="color:var(--success)"></i> Finished`;
                } else if (filter === 'received') {
                    actionHtml = `<button onclick="prepareEdit(this)" style="border:none; background:none; cursor:pointer;"><i class="fa fa-eye" style="color:var(--aiims-blue)"></i> View</button>`;
                }

                row.innerHTML = `
                    ${checkboxCell}
                    <td><b>${entry.req_id}</b></td>
                    <td>${entry.buyer_group || ''}</td>
                    <td>${entry.buyer_detail || ''}</td>
                    <td>${entry.sample_type || ''}</td>
                    <td>${entry.fabric || ''}</td>
                    <td>${entry.color || ''}</td>
                    <td>${entry.size || ''}</td>
                    <td>${entry.quantity || ''}</td>
                    <td>${entry.deadline || ''}</td>
                    <td><span class="badge bg-${s.replace(' ', '_')}">${s.replace('_', ' ')}</span></td>
                    <td style="text-align:center;">${actionHtml}</td>`;
                tbody.appendChild(row);
            });
            filterTable(); // apply display rules immediately
        } catch (e) {
            tbody.innerHTML = "<tr><td colspan='12' style='text-align:center; color:red;'>Error fetching data.</td></tr>";
        }
    }

  function toggleDesignCheckboxes(masterSource) {
    const checkboxes = document.querySelectorAll('.design-row-cb');
    checkboxes.forEach(cb => {
        // Only toggle rows that aren't hidden by the search filter
        const row = cb.closest('tr');
        if (row && row.style.display !== 'none') {
            cb.checked = masterSource.checked;
        }
    });
}

    function openFormModal() {
        editingDbId = null;
        document.getElementById('form-header-text').innerText = "NEW REQUEST";
        document.getElementById('mainSubmitBtn').innerText = "SUBMIT REQUEST";
        document.getElementById('forwardBtn').style.display = 'none';
        document.getElementById('form-view').style.display = 'block';
        document.getElementById('req_id').value = "RG-" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('fabric').value = "";
        document.getElementById('deadline').value = "";
        document.getElementById('remarks').value = "";
        document.getElementById('samplingGridBody').innerHTML = "";
        addRow('samplingGridBody');
    }

    function closeFormModal() { 
        document.getElementById('form-view').style.display = 'none'; 
        editingDbId = null;
    }

    function addRow(id) {
        const tbody = document.getElementById(id);
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" name="s_color[]" placeholder="Color"></td>
            <td><input type="number" name="s_quantity[]" value="1"></td>
            <td><input type="text" name="s_size[]" placeholder="Size"></td>
            <td><button type="button" onclick="this.closest('tr').remove()" style="color:red; border:none; background:none; cursor:pointer;">&times;</button></td>`;
        tbody.appendChild(tr);
    }

    function prepareEdit(btn) {
        const row = btn.closest('tr');
        const entry = JSON.parse(row.dataset.entry);
        editingDbId = entry.id;

        document.getElementById('form-view').style.display = 'block';
        document.getElementById('form-header-text').innerText = "EDIT REQUEST: " + entry.req_id;
        document.getElementById('mainSubmitBtn').innerText = "UPDATE CHANGES";

        // FORWARD BUTTON LOGIC (Case Insensitive)
        const currentStatus = (entry.status || '').toLowerCase().trim();
        document.getElementById('forwardBtn').style.display = (currentStatus === 'tracking') ? 'block' : 'none';

        document.getElementById('req_id').value = entry.req_id;
        document.getElementById('fabric').value = entry.fabric || '';
        document.getElementById('deadline').value = entry.deadline || '';
        document.getElementById('remarks').value = entry.remarks || '';
        document.getElementById('sample_type').value = entry.sample_type;

        const gridBody = document.getElementById('samplingGridBody');
        gridBody.innerHTML = "";
        if (entry.items && entry.items.length > 0) {
            entry.items.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input type="text" name="s_color[]" value="${item.color}"></td>
                    <td><input type="number" name="s_quantity[]" value="${item.quantity}"></td>
                    <td><input type="text" name="s_size[]" value="${item.size}"></td>
                    <td><button type="button" onclick="this.closest('tr').remove()" style="color:red; border:none; background:none; cursor:pointer;">&times;</button></td>`;
                gridBody.appendChild(tr);
            });
        } else {
            addRow('samplingGridBody');
        }
    }

    async function forwardToReceived() {
        if (!editingDbId || !confirm("Confirm sample has been received?")) return;
        try {
            const res = await fetch(`/update_design_entry/${editingDbId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'received' })
            });
            if (res.ok) { alert("Moved to Received"); showSection('Received'); }
        } catch (e) { alert("Error forwarding."); }
    }

    async function submitEntry() {
        const rows = document.querySelectorAll('#samplingGridBody tr');
        const items = [];
        rows.forEach(row => {
            const color = row.querySelector('[name="s_color[]"]').value;
            const qty = row.querySelector('[name="s_quantity[]"]').value;
            const size = row.querySelector('[name="s_size[]"]').value;
            if(color.trim() !== "") items.push({ color, quantity: qty, size });
        });

        if (items.length === 0) { alert("Add at least one item."); return; }

        const formData = {
            req_id: document.getElementById('req_id').value,
            buyer_group: document.getElementById('buyer_group').options[document.getElementById('buyer_group').selectedIndex]?.text || '',
            buyer_detail: document.getElementById('buyer_details').value,
            sample_type: document.getElementById('sample_type').value,
            fabric: document.getElementById('fabric').value,
            deadline: document.getElementById('deadline').value,
            remarks: document.getElementById('remarks').value,
            items: items
        };

        const url = editingDbId ? `/update_design_entry/${editingDbId}` : '/add_design_entry';
        try {
            const res = await fetch(url, {
                method: editingDbId ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            if (res.ok) { closeFormModal(); showSection(currentFilter); }
        } catch (e) { alert("Error saving."); }
    }

   async function processBatchCutting() {
    const checkedBoxes = document.querySelectorAll('.design-row-cb:checked');
    const selectedDbIds = Array.from(checkedBoxes).map(cb => cb.value);
    console.log("111",checkedBoxes);
    console.log("222")
    if (selectedDbIds.length === 0) {
        alert("Please select at least one row to move.");
        return;
    }

    if (!confirm(`Move ${selectedDbIds.length} items to Cutting?`)) return;

    try {
        // 3. Use Promise.all to send requests in parallel (faster and safer)
        const updatePromises = selectedDbIds.map(id => 
            fetch(`/update_item_status/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'cutting_queue' })
            })
        );

        await Promise.all(updatePromises);
        
        alert("Batch Move Successful");
        
        // 4. CLEAN UP: Uncheck the master to reset the state
        const master = document.getElementById('designMasterReceived');
        if (master) master.checked = false;

        // 5. Refresh view but keep search text
        const currentSearch = document.getElementById('tableSearch').value;
        await loadExistingEntries(currentFilter); 
        document.getElementById('tableSearch').value = currentSearch;
        filterTable();
    } catch (e) {
        console.error("Batch Move Error:", e);
        alert("One or more items failed to move. Please refresh and try again.");
    }
}

    async function markCuttingComplete(dbId, btn) {
        if (!confirm("Mark as Finished?")) return;
        btn.disabled = true;
        try {
            const res = await fetch(`/update_item_status/${dbId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'completed' })
            });
            if (res.ok) showSection('Cutting');
        } catch (e) { alert("Error."); btn.disabled = false; }
    }

    async function deleteEntry(id) {
        if (!confirm("Delete permanently?")) return;
        await fetch(`/delete_design_entry/${id}`, { method: 'DELETE' });
        showSection(currentFilter);
    }

    async function fetchMerchants() {
        const res = await fetch('/get_merchants');
        const data = await res.json();
        const sel = document.getElementById('buyer_group');
        sel.innerHTML = '<option value="">Select Group</option>';
        data.forEach(m => {
            let opt = document.createElement('option');
            opt.value = m.id; opt.textContent = m.name; sel.appendChild(opt);
        });
    }

    async function fetchMerchant_details(id) {
        if (!id) return;
        const res = await fetch(`/get_merchant_details/${id}`);
        const data = await res.json();
        const sel = document.getElementById('buyer_details');
        sel.innerHTML = '<option value="">Select Detail</option>';
        data.forEach(m => {
            let opt = document.createElement('option');
            opt.value = m.name; opt.textContent = m.name; sel.appendChild(opt);
        });
    }

    function filterTable() {
        const filter = document.getElementById("tableSearch").value.toLowerCase().trim();
        const rows = document.getElementById("tableBody").getElementsByTagName("tr");
        const requiresSearch = (currentFilter === 'received' || currentFilter === 'cutting');

        let visibleCount = 0;

        for (let row of rows) {
            // Skip placeholder rows from processing
            if (row.id === "searchPlaceholderRow" || (row.cells.length === 1 && row.cells[0].colSpan > 1)) {
                row.style.display = "none";
                continue;
            }

            if (requiresSearch && filter === "") {
                row.style.display = "none";
            } else {
                if (row.innerText.toLowerCase().includes(filter)) {
                    row.style.display = "";
                    visibleCount++;
                } else {
                    row.style.display = "none";
                }
            }
        }

        let placeholder = document.getElementById("searchPlaceholderRow");
        if (!placeholder) {
            placeholder = document.createElement('tr');
            placeholder.id = "searchPlaceholderRow";
            placeholder.innerHTML = `<td colspan="12" style="text-align:center; color:#666; font-weight:bold; padding:20px;"></td>`;
            document.getElementById("tableBody").appendChild(placeholder);
        }

        if (requiresSearch && filter === "") {
            placeholder.children[0].innerText = "Please enter an ID in the search bar to view records.";
            placeholder.style.display = "";
        } else if (visibleCount === 0) {
            placeholder.children[0].innerText = "No records found.";
            placeholder.style.display = "";
        } else {
            placeholder.style.display = "none";
        }
    }
</script>
</body>
</html>

            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }

        .main-menu { 
            background-color: var(--aiims-blue); 
            display: flex; 
            padding: 0 40px; 
            list-style: none; 
            margin: 0; 
            min-height: 50px; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .main-menu li { position: relative; }
        .main-menu li a { color: white; text-decoration: none; padding: 15px 25px; display: block; font-size: 14px; font-weight: 600; cursor: pointer; }
        .main-menu li a:hover { background: rgba(255,255,255,0.1); }

        .dropdown-content { 
            display: none; 
            position: absolute; 
            background: white; 
            min-width: 200px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.2); 
            z-index: 1001; 
            top: 100%; 
        }

        .dropdown:hover > .dropdown-content { display: block; }
        .dropdown-content a { 
            color: var(--aiims-blue) !important; 
            padding: 12px 20px !important; 
            border-bottom: 1px solid #f1f1f1; 
            text-decoration: none; 
            display: block; 
            cursor: pointer; 
            font-size: 13px; 
        }

        #form-view { 
            display: none; 
            position: fixed; 
            z-index: 2000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); 
            overflow-y: auto;
        }

        #form-view .card { width: 70%; margin: 50px auto; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from {transform: translateY(-20px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }

        .container { padding: 30px 40px; max-width: 1300px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; overflow: hidden; }
        .card-header { padding: 20px 30px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 30px; }
        
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #636e72; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input[readonly] { background-color: #f9f9f9; color: var(--aiims-purple); font-weight: bold; border: 1px solid #eee; }

        .btn-submit { background: var(--aiims-blue); color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-bottom: 10px; }
        .btn-forward { background: var(--success); color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; display: none; margin-bottom: 10px; border: 2px solid #1e8449; }
        .btn-new-request { background: var(--aiims-purple); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-save-batch { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; display: none; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; background: #f8f9fa; padding: 15px; font-size: 12px; color: var(--aiims-blue); border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 13px; }

        .badge { display: inline-block; min-width: 80px; text-align: center; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase;}
        .bg-tracking { background: #fff3e0; color: #e65100; }
        .bg-received { background: #e8f5e9; color: #2e7d32; }
        .bg-cutting_queue { background: #f3e5f5; color: #7b1fa2; border: 1px solid #7b1fa2; }
        .bg-completed { background: #e3f2fd; color: #1565c0; border: 1px solid #1565c0; }
        
        .search-container { position: relative; width: 300px; }
        .search-container input { padding-left: 35px; border-radius: 20px; }
        .search-container i { position: absolute; left: 12px; top: 12px; color: #aaa; }
        .row-selector { width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <header class="top-nav">
        <h2 style="margin:0; color:var(--aiims-blue);">R.GLOBAL <span style="color:var(--aiims-purple)">DESIGN</span></h2>
        <button onclick="window.location.href='/logout'" style="background: #eee; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">Logout</button>
    </header>

    <nav><ul class="main-menu" id="horizontal-menu"></ul></nav>

    <div class="container">
        <div id="database-view" class="card">
            <div class="card-header">
                <h3 id="table-title" style="margin:0; color:var(--aiims-blue);">Design Tracking</h3>
                <div class="search-container">
                    <i class="fa fa-search"></i>
                    <input type="text" id="tableSearch" onkeyup="filterTable()" placeholder="Search requests...">
                </div>
                <div id="headerActions">
                    <button class="btn-new-request" id="headerNewRequestBtn" onclick="openFormModal()"><i class="fa fa-plus"></i> NEW REQUEST</button>
                    <button class="btn-save-batch" id="batchSaveBtn" onclick="processBatchCutting()"><i class="fa fa-save"></i> MOVE TO CUTTING</button>
                </div>
            </div>
            <div class="card-body"> 
                <div style="overflow-x: auto;">
                    <table>
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="form-view">
            <div class="card">
                <div class="card-header">
                    <h3 id="form-header-text" style="margin:0; color:var(--aiims-blue);">NEW REQUEST</h3>
                </div>
                <div class="card-body">
                    <div class="form-row">
                        <div><label>Request ID</label><input type="text" id="req_id" readonly></div>
                        <div><label>Buyer Group</label><select id="buyer_group" onchange="fetchMerchant_details(this.value)"></select></div>
                        <div><label>Buyer Detail</label><select id="buyer_details"></select></div>
                    </div>
                    <div class="form-row">
                        <div><label>Sample Type</label>
                            <select id="sample_type">
                                <option value="Material Sample">Material Sample</option>
                                <option value="Fit Sample">Fit Sample</option>
                                <option value="Size Set">Size Set</option>
                                <option value="Washing Sample">Washing Sample</option>
                            </select>
                        </div>
                        <div><label>Fabric Detail</label><input type="text" id="fabric" placeholder="Enter fabric detail"></div>
                        <div><label>Target Date</label><input type="date" id="deadline"></div>
                    </div>

                    <div style="margin: 25px 0; border: 1px solid #eee; padding: 15px; border-radius: 8px; background: #fafafa">
                        <label style="color:var(--aiims-blue); font-weight:bold; margin-bottom: 10px; display:block;">ITEM BREAKDOWN</label>   
                        <table class="grid-table">
                            <thead><tr><th>Color</th><th>Qty</th><th>Size</th><th style="width:40px;"></th></tr></thead>
                            <tbody id="samplingGridBody"></tbody>
                        </table>
                        <button type="button" class="btn-add" style="background:#eee; border:1px dashed blue; width:100%; padding:8px; cursor:pointer; margin-top:10px;" onclick="addRow('samplingGridBody')">+ ADD ROW</button> 
                    </div>

                    <textarea id="remarks" rows="2" placeholder="Internal remarks..."></textarea>

                    <div style="margin-top:20px;">
                        <button class="btn-submit" id="mainSubmitBtn" onclick="submitEntry()">SUBMIT REQUEST</button>
                        <button class="btn-forward" id="forwardBtn" onclick="forwardToReceived()">FORWARD TO RECEIVED</button>
                        <button type="button" onclick="closeFormModal()" style="width:100%; background:none; border:none; color:grey; cursor:pointer; padding:10px;">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    let editingDbId = null;
    let currentFilter = 'tracking';

    window.onload = async function() { 
        await loadMenu(); 
        await fetchMerchants(); 
        showSection('Tracking'); 
    };

    async function loadMenu() {
        const menuUl = document.getElementById('horizontal-menu');
        try {
            const res = await fetch('/get_menu');
            const menus = await res.json();
            menuUl.innerHTML = menus.map(m => {
                if (m.name.toLowerCase().includes('design')) {
                    return `<li class="dropdown">
                        <a href="#">Design <i class="fa fa-caret-down"></i></a>
                        <div class="dropdown-content">
                            <a onclick="showSection('Tracking')">Sampling</a>
                            <a onclick="showSection('Received')">Received</a>
                            <a onclick="showSection('Cutting')">Cutting</a>
                        </div>
                    </li>`;
                }
                return `<li><a href="${m.route}">${m.name}</a></li>`;
            }).join('');
        } catch (e) { 
            menuUl.innerHTML = '<li><a onclick="showSection(\'Tracking\')">Design Tracking</a></li>';
        }
    }

    function showSection(type) {
        currentFilter = type.toLowerCase();
        closeFormModal();
        document.getElementById('table-title').innerText = (type === 'Cutting') ? "Cutting Queue" : type + " View";
        document.getElementById('headerNewRequestBtn').style.display = (currentFilter === 'tracking') ? 'block' : 'none';
        document.getElementById('batchSaveBtn').style.display = (currentFilter === 'received') ? 'block' : 'none';
        loadExistingEntries(type);
    }

    async function loadExistingEntries(filterType) {
        const tbody = document.getElementById('tableBody');
        const thead = document.getElementById('tableHead');
        const filter = filterType.toLowerCase();

        let checkboxHeader = filter === 'received' ? 
    `<th style="width:40px;"><input type="checkbox" id="designMasterReceived" onclick="toggleDesignCheckboxes(this)"></th>` : '';
        thead.innerHTML = `<tr>${checkboxHeader}<th>ID</th><th>Buyer Group</th><th>Details</th><th>Sample</th><th>Fabric</th><th>Color</th><th>Size</th><th>Qty</th><th>Deadline</th><th>Status</th><th>Action</th></tr>`;
        tbody.innerHTML = "<tr><td colspan='12' style='text-align:center'>Loading...</td></tr>"; 

        try {
            const res = await fetch('/get_design_data/design_requests');
            const entries = await res.json();
            tbody.innerHTML = "";
            
            const filteredEntries = entries.filter(e => {
                const s = (e.item_status || e.status || '').toLowerCase().trim();
                if (filter === 'cutting') return (s === 'cutting_queue' || s === 'completed');
                return s === filter;
            });

            if (filteredEntries.length === 0) {
                tbody.innerHTML = `<tr><td colspan='12' style='text-align:center'>No records found.</td></tr>`;
                return;
            }
        
            filteredEntries.forEach(entry => {
                const s = (entry.item_status || entry.status).toLowerCase().trim();
                const row = document.createElement('tr');
                row.dataset.entry = JSON.stringify(entry);
                if (s === 'completed') row.style.opacity = '0.75';

            let checkboxCell = filter === 'received' ? 
               `<td><input type="checkbox" class="design-row-cb" id="design-cb-${entry.item_id}" value="${entry.item_id}" onclick="event.stopPropagation()"></td>` : '';
                
                let actionHtml = "";
                if (s === 'cutting_queue') {
                    actionHtml = `<button onclick="markCuttingComplete(${entry.item_id}, this)" style="background:var(--success); color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">DONE</button>`;
                } else if (s === 'tracking') {
                    actionHtml = `<button onclick="prepareEdit(this)" style="border:none; background:none; cursor:pointer; margin-right:10px;"><i class="fa fa-edit" style="color:var(--warning)"></i></button>
                                  <button onclick="deleteEntry(${entry.id})" style="border:none; background:none; cursor:pointer;"><i class="fa fa-trash" style="color:var(--danger)"></i></button>`;
                } else if (s === 'completed') {
                    actionHtml = `<i class="fa fa-check-circle" style="color:var(--success)"></i> Finished`;
                } else if (filter === 'received') {
                    actionHtml = `<button onclick="prepareEdit(this)" style="border:none; background:none; cursor:pointer;"><i class="fa fa-eye" style="color:var(--aiims-blue)"></i> View</button>`;
                }

                row.innerHTML = `
                    ${checkboxCell}
                    <td><b>${entry.req_id}</b></td>
                    <td>${entry.buyer_group || ''}</td>
                    <td>${entry.buyer_detail || ''}</td>
                    <td>${entry.sample_type || ''}</td>
                    <td>${entry.fabric || ''}</td>
                    <td>${entry.color || ''}</td>
                    <td>${entry.size || ''}</td>
                    <td>${entry.quantity || ''}</td>
                    <td>${entry.deadline || ''}</td>
                    <td><span class="badge bg-${s.replace(' ', '_')}">${s.replace('_', ' ')}</span></td>
                    <td style="text-align:center;">${actionHtml}</td>`;
                tbody.appendChild(row);
            });
        } catch (e) {
            tbody.innerHTML = "<tr><td colspan='12' style='text-align:center; color:red;'>Error fetching data.</td></tr>";
        }
    }

  function toggleDesignCheckboxes(masterSource) {
    const checkboxes = document.querySelectorAll('.design-row-cb');
    checkboxes.forEach(cb => {
        const row = cb.closest('tr');
        if (row && row.style.display !== 'none') {
            cb.checked = masterSource.checked;
        }
    });
}

    function openFormModal() {
        editingDbId = null;
        document.getElementById('form-header-text').innerText = "NEW REQUEST";
        document.getElementById('mainSubmitBtn').innerText = "SUBMIT REQUEST";
        document.getElementById('forwardBtn').style.display = 'none';
        document.getElementById('form-view').style.display = 'block';
        document.getElementById('req_id').value = "RG-" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('fabric').value = "";
        document.getElementById('deadline').value = "";
        document.getElementById('remarks').value = "";
        document.getElementById('samplingGridBody').innerHTML = "";
        addRow('samplingGridBody');
    }

    function closeFormModal() { 
        document.getElementById('form-view').style.display = 'none'; 
        editingDbId = null;
    }

    function addRow(id) {
        const tbody = document.getElementById(id);
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" name="s_color[]" placeholder="Color"></td>
            <td><input type="number" name="s_quantity[]" value="1"></td>
            <td><input type="text" name="s_size[]" placeholder="Size"></td>
            <td><button type="button" onclick="this.closest('tr').remove()" style="color:red; border:none; background:none; cursor:pointer;">&times;</button></td>`;
        tbody.appendChild(tr);
    }

    function prepareEdit(btn) {
        const row = btn.closest('tr');
        const entry = JSON.parse(row.dataset.entry);
        editingDbId = entry.id;

        document.getElementById('form-view').style.display = 'block';
        document.getElementById('form-header-text').innerText = "EDIT REQUEST: " + entry.req_id;
        document.getElementById('mainSubmitBtn').innerText = "UPDATE CHANGES";

        // FORWARD BUTTON LOGIC (Case Insensitive)
        const currentStatus = (entry.status || '').toLowerCase().trim();
        document.getElementById('forwardBtn').style.display = (currentStatus === 'tracking') ? 'block' : 'none';

        document.getElementById('req_id').value = entry.req_id;
        document.getElementById('fabric').value = entry.fabric || '';
        document.getElementById('deadline').value = entry.deadline || '';
        document.getElementById('remarks').value = entry.remarks || '';
        document.getElementById('sample_type').value = entry.sample_type;

        const gridBody = document.getElementById('samplingGridBody');
        gridBody.innerHTML = "";
        if (entry.items && entry.items.length > 0) {
            entry.items.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input type="text" name="s_color[]" value="${item.color}"></td>
                    <td><input type="number" name="s_quantity[]" value="${item.quantity}"></td>
                    <td><input type="text" name="s_size[]" value="${item.size}"></td>
                    <td><button type="button" onclick="this.closest('tr').remove()" style="color:red; border:none; background:none; cursor:pointer;">&times;</button></td>`;
                gridBody.appendChild(tr);
            });
        } else {
            addRow('samplingGridBody');
        }
    }

    async function forwardToReceived() {
        if (!editingDbId || !confirm("Confirm sample has been received?")) return;
        try {
            const res = await fetch(`/update_design_entry/${editingDbId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'received' })
            });
            if (res.ok) { alert("Moved to Received"); showSection('Received'); }
        } catch (e) { alert("Error forwarding."); }
    }

    async function submitEntry() {
        const rows = document.querySelectorAll('#samplingGridBody tr');
        const items = [];
        rows.forEach(row => {
            const color = row.querySelector('[name="s_color[]"]').value;
            const qty = row.querySelector('[name="s_quantity[]"]').value;
            const size = row.querySelector('[name="s_size[]"]').value;
            if(color.trim() !== "") items.push({ color, quantity: qty, size });
        });

        if (items.length === 0) { alert("Add at least one item."); return; }

        const formData = {
            req_id: document.getElementById('req_id').value,
            buyer_group: document.getElementById('buyer_group').options[document.getElementById('buyer_group').selectedIndex]?.text || '',
            buyer_detail: document.getElementById('buyer_details').value,
            sample_type: document.getElementById('sample_type').value,
            fabric: document.getElementById('fabric').value,
            deadline: document.getElementById('deadline').value,
            remarks: document.getElementById('remarks').value,
            items: items
        };

        const url = editingDbId ? `/update_design_entry/${editingDbId}` : '/add_design_entry';
        try {
            const res = await fetch(url, {
                method: editingDbId ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            if (res.ok) { closeFormModal(); showSection(currentFilter); }
        } catch (e) { alert("Error saving."); }
    }

   async function processBatchCutting() {
    const checkedBoxes = document.querySelectorAll('.design-row-cb:checked');
    const selectedDbIds = Array.from(checkedBoxes).map(cb => cb.value);
    console.log("111",checkedBoxes);
    console.log("222")
    if (selectedDbIds.length === 0) {
        alert("Please select at least one row to move.");
        return;
    }

    if (!confirm(`Move ${selectedDbIds.length} items to Cutting?`)) return;

    try {
        // 3. Use Promise.all to send requests in parallel (faster and safer)
        const updatePromises = selectedDbIds.map(id => 
            fetch(`/update_item_status/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'cutting_queue' })
            })
        );

        await Promise.all(updatePromises);
        
        alert("Batch Move Successful");
        
        // 4. CLEAN UP: Uncheck the master to reset the state
        const master = document.getElementById('designMasterReceived');
        if (master) master.checked = false;

        // 5. Refresh view
        showSection('Received'); 
    } catch (e) {
        console.error("Batch Move Error:", e);
        alert("One or more items failed to move. Please refresh and try again.");
    }
}

    async function markCuttingComplete(dbId, btn) {
        if (!confirm("Mark as Finished?")) return;
        btn.disabled = true;
        try {
            const res = await fetch(`/update_item_status/${dbId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'completed' })
            });
            if (res.ok) showSection('Cutting');
        } catch (e) { alert("Error."); btn.disabled = false; }
    }

    async function deleteEntry(id) {
        if (!confirm("Delete permanently?")) return;
        await fetch(`/delete_design_entry/${id}`, { method: 'DELETE' });
        showSection(currentFilter);
    }

    async function fetchMerchants() {
        const res = await fetch('/get_merchants');
        const data = await res.json();
        const sel = document.getElementById('buyer_group');
        sel.innerHTML = '<option value="">Select Group</option>';
        data.forEach(m => {
            let opt = document.createElement('option');
            opt.value = m.id; opt.textContent = m.name; sel.appendChild(opt);
        });
    }

    async function fetchMerchant_details(id) {
        if (!id) return;
        const res = await fetch(`/get_merchant_details/${id}`);
        const data = await res.json();
        const sel = document.getElementById('buyer_details');
        sel.innerHTML = '<option value="">Select Detail</option>';
        data.forEach(m => {
            let opt = document.createElement('option');
            opt.value = m.name; opt.textContent = m.name; sel.appendChild(opt);
        });
    }

    function filterTable() {
        const filter = document.getElementById("tableSearch").value.toLowerCase();
        const rows = document.getElementById("tableBody").getElementsByTagName("tr");
        for (let row of rows) {
            row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
        }
    }
</script>
</body>
